<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
  <title>共读</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <!-- 登录 -->
  <div id="login" class="center-wrap">
    <div class="card">
      <h1>一起读</h1>
      <p class="sub">栖和凝的共读小屋</p>
      <div class="field">
        <label>是谁呀</label>
        <input id="name" value="栖" autocomplete="username" />
      </div>
      <div class="field">
        <label>暗号</label>
        <input id="password" type="password" autocomplete="current-password" />
      </div>
      <button class="btn pink" id="loginBtn">进来</button>
      <div class="err" id="loginErr"></div>
    </div>
  </div>

  <!-- 书库 -->
  <div id="app" class="hidden">
    <div class="topbar">
      <div class="brand">📖 一起读</div>
      <div class="who" id="who"></div>
    </div>
    <div class="container">
      <div class="lib-head">
        <h2>书架</h2>
        <div style="display:flex;gap:8px;align-items:center">
          <button id="ann-index-btn">划线索引</button>
          <input type="file" id="fileInput" accept=".epub,.txt" class="hidden" />
          <button class="btn" style="width:auto;padding:9px 16px" id="uploadBtn">+ 加一本书</button>
        </div>
      </div>
      <div id="shelf" class="shelf"></div>
      <div id="empty" class="empty hidden">书架空空的，点右上角加一本 epub 或 txt 吧。</div>

  <!-- 划线索引抽屉 -->
  <div id="ann-index-drawer">
    <div class="panel">
      <h3>划线索引</h3>
      <div id="annIndexContent"></div>
    </div>
  </div>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
